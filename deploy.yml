name: Deploy to GitHub Pages

on:
  push:
    branches: [main] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Install and Build 
        run: |
          npm install
          npm run build
        env:
          # This passes your Supabase keys to the build process
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite builds into the 'dist' folder
          branch: gh-pages # This is the hidden branch where the live code lives